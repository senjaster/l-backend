name: Migrate Prod to Dev

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 03:00 UTC (06:00 Moscow)

jobs:
  migrate:
    name: Copy prod schema & data to dev
    runs-on: ubuntu-24.04
    environment: dev

    env:
      PROD_HOST: rc1b-3rk9341thr2gignd.mdb.yandexcloud.net
      PROD_PORT: 6432
      PROD_DB:   db

      DEV_HOST:  rc1b-3rk9341thr2gignd.mdb.yandexcloud.net
      DEV_PORT:  6432
      DEV_DB:    db_dev

      SCHEMA: lesiv

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v7
        with:
          ref: dev  # Always use dev migrations; cron fires from main but we need the latest

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      # ── 1. Drop schema in dev ─────────────────────────────────────────────────

      - name: Drop schema in dev
        env:
          PGPASSWORD: ${{ secrets.FLYWAY_PASSWORD }}
        run: |
          psql \
            "postgresql://${{ vars.FLYWAY_USER }}@$DEV_HOST:$DEV_PORT/$DEV_DB?sslmode=require" \
            -c "DROP SCHEMA IF EXISTS $SCHEMA CASCADE;"

      # ── 2. Copy DDL from prod to dev (piped in memory) ────────────────────────

      - name: Copy DDL from prod to dev
        env:
          PGPASSWORD_PROD: ${{ secrets.PROD_DUMP_PASSWORD }}
          PGPASSWORD_DEV:  ${{ secrets.FLYWAY_PASSWORD }}
        run: |
          PGPASSWORD="$PGPASSWORD_PROD" pg_dump \
            --schema-only \
            --schema="$SCHEMA" \
            --no-owner \
            --no-privileges \
            "postgresql://${{ vars.PROD_DUMP_USER }}@$PROD_HOST:$PROD_PORT/$PROD_DB?sslmode=require" \
          | PGPASSWORD="$PGPASSWORD_DEV" psql \
              --set ON_ERROR_STOP=1 \
              "postgresql://${{ vars.FLYWAY_USER }}@$DEV_HOST:$DEV_PORT/$DEV_DB?sslmode=require"

      # ── 3. Copy data from prod to dev (piped in memory) ───────────────────────

      - name: Copy data from prod to dev
        env:
          PGPASSWORD_PROD: ${{ secrets.PROD_DUMP_PASSWORD }}
          PGPASSWORD_DEV:  ${{ secrets.FLYWAY_PASSWORD }}
        run: |
          PGPASSWORD="$PGPASSWORD_PROD" pg_dump \
            --data-only \
            --schema="$SCHEMA" \
            --exclude-table="$SCHEMA.tokens" \
            "postgresql://${{ vars.PROD_DUMP_USER }}@$PROD_HOST:$PROD_PORT/$PROD_DB?sslmode=require" \
          | PGPASSWORD="$PGPASSWORD_DEV" psql \
              --set ON_ERROR_STOP=1 \
              "postgresql://${{ vars.FLYWAY_USER }}@$DEV_HOST:$DEV_PORT/$DEV_DB?sslmode=require"

      # ── 4. Apply pending Flyway migrations on dev ─────────────────────────────
      # Applies versioned migrations not yet in prod, and re-applies all
      # repeatable migrations (R__permissions.sql, R__equipment_detailed_view.sql)
      # which restores all GRANTs stripped by --no-privileges above.

      - name: Install Flyway
        run: |
          wget -qO- https://download.red-gate.com/maven/release/com/redgate/flyway/flyway-commandline/12.0.1/flyway-commandline-12.0.1-linux-x64.tar.gz \
            | tar -xz -C "$HOME"
          echo "$HOME/flyway-12.0.1" >> "$GITHUB_PATH"

      - name: Run Flyway migrations on dev
        run: flyway migrate
        working-directory: db
        env:
          FLYWAY_URL:      ${{ vars.FLYWAY_URL }}
          FLYWAY_USER:     ${{ vars.FLYWAY_USER }}
          FLYWAY_PASSWORD: ${{ secrets.FLYWAY_PASSWORD }}
