name: Tests

on:
  pull_request:
    branches:
      - '**'

jobs:
  typecheck:
    name: Run pyright
    runs-on: ubuntu-24.04
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.3'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Generate aiosql stubs
        run: python scripts/generate_aiosql_stubs.py

      - name: Run pyright
        run: pyright

  lint:
    name: Run ruff
    runs-on: ubuntu-24.04
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.3'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  test:
    name: Run pytest
    runs-on: ubuntu-24.04

    permissions:
      checks: write
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lesiv_test
          POSTGRES_USER: lesiv_admin
          POSTGRES_PASSWORD: lesiv_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lesiv_admin -d lesiv_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # App database connection (asyncpg for the app itself)
      DATABASE_URL: postgresql://lesiv_admin:lesiv_test_password@localhost:5432/lesiv_test

      # Flyway credentials (used by conftest.py to run migrations before tests)
      FLYWAY_URL: jdbc:postgresql://localhost:5432/lesiv_test
      FLYWAY_USER: lesiv_admin
      FLYWAY_PASSWORD: lesiv_test_password

      # S3 — dummy values; tests don't make real S3 calls
      S3_BUCKET_NAME: test-bucket
      S3_ACCESS_KEY_ID: test-key
      S3_SECRET_ACCESS_KEY: test-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.3'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Generate RSA key pair for auth tests
        run: |
          openssl genrsa -out private.pem 2048
          openssl rsa -in private.pem -pubout -out public.pem

      - name: Create l_app_role in test database
        run: |
          psql postgresql://lesiv_admin:lesiv_test_password@localhost:5432/lesiv_test \
            -c "CREATE ROLE l_app_role;"

      - name: Install Flyway
        run: |
          wget -qO- https://download.red-gate.com/maven/release/com/redgate/flyway/flyway-commandline/12.0.1/flyway-commandline-12.0.1-linux-x64.tar.gz \
            | tar -xz -C "$HOME"
          echo "$HOME/flyway-12.0.1" >> "$GITHUB_PATH"

      - name: Run tests
        run: pytest --junit-xml=test-report.xml

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}       # run this step even if previous step failed
        with:
          name: Pytest report         # Name of the check run which will be created
          path: test-report.xml       # Path to test results
          reporter: python-xunit      # Format of test results
