name: Deploy

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: cr.yandex
  REGISTRY_ID: crpd2b5gg7tt3399i6c9
  IMAGE_NAME: t-app-backend

jobs:
  deploy:
    name: Build, Migrate & Deploy
    runs-on: ubuntu-24.04
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Extract version tag
        id: tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      # ── Docker ────────────────────────────────────────────────────────────

      - name: Authenticate with Yandex Container Registry
        run: |
          echo '${{ secrets.YC_SA_JSON_KEY }}' | \
            docker login \
              --username json_key \
              --password-stdin \
              cr.yandex

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t $REGISTRY/$REGISTRY_ID/$IMAGE_NAME:${{ steps.tag.outputs.VERSION }} \
            .

      - name: Push Docker image
        run: |
          docker push $REGISTRY/$REGISTRY_ID/$IMAGE_NAME:${{ steps.tag.outputs.VERSION }}

      # ── Database migrations ───────────────────────────────────────────────

      - name: Install Flyway
        run: |
          wget -qO- https://download.red-gate.com/maven/release/com/redgate/flyway/flyway-commandline/12.0.1/flyway-commandline-12.0.1-linux-x64.tar.gz \
            | tar -xz -C "$HOME"
          echo "$HOME/flyway-12.0.1" >> "$GITHUB_PATH"

      - name: Run Flyway migrations
        run: flyway migrate
        working-directory: db
        env:
          FLYWAY_URL: ${{ vars.FLYWAY_URL }}
          FLYWAY_USER: ${{ vars.FLYWAY_USER }}
          FLYWAY_PASSWORD: ${{ secrets.FLYWAY_PASSWORD }}

      # ── Yandex Cloud deployment ───────────────────────────────────────────

      - name: Deploy Serverless Container
        uses: yc-actions/yc-sls-container-deploy@v4
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_KEY }}
          container-name: t-app-backend
          folder-id: ${{ vars.YC_FOLDER_ID }}
          revision-service-account-id: ${{ vars.YC_SA_ID }}
          revision-cores: 2
          revision-memory: 4096Mb
          revision-core-fraction: 100
          revision-concurrency: 1
          revision-image-url: ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.VERSION }}
          revision-execution-timeout: 10
          revision-network-id: enpaulbnqhiqbshkl7q6
          revision-min-instances: 1
          revision-env: |
            ACCESS_TOKEN_LIFETIME_MIN=1440
            DATABASE_URL=postgresql://l_app_user@rc1b-3rk9341thr2gignd.mdb.yandexcloud.net:6432/db
            DB_DRIVER=asyncpg
            REFRESH_TOKEN_LIFETIME_DAYS=30
            REQUIRE_AUTH=true
            S3_BUCKET_NAME=l-inspector-photos
            TRUST_INVALID_TOKENS=true
          revision-secrets: |
            DATABASE_PASSWORD=e6qh0rkr8452ut3r72jh/e6q1n1fesev60cs8nj6h/PG_PASSWORD
            PRIVATE_KEY=e6qdsc0p78mm1oh0ttks/e6qappn009l2hcq2mb66/PRIVATE_KEY
            PUBLIC_KEY=e6qdsc0p78mm1oh0ttks/e6qappn009l2hcq2mb66/PUBLIC_KEY
            S3_ACCESS_KEY_ID=e6q09e1a3rdj6olrcpki/e6q3fvcldtv68ol014n1/S3_ACCESS_KEY_ID
            S3_SECRET_ACCESS_KEY=e6q09e1a3rdj6olrcpki/e6q3fvcldtv68ol014n1/S3_SECRET_ACCESS_KEY
