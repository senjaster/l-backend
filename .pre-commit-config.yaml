repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint + import sort
        language: system
        entry: .venv/bin/ruff check --fix
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: Ruff format
        language: system
        entry: .venv/bin/ruff format
        types: [python]
        pass_filenames: true

      - id: generate-aiosql-stubs
        name: Generate aiosql type stubs
        language: system
        entry: .venv/bin/python scripts/generate_aiosql_stubs.py
        files: ^app/queries/.*\.sql$
        pass_filenames: false
