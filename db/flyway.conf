# Flyway Configuration for L-Inspector Backend
# https://documentation.red-gate.com/fd/configuration-files-184127472.html

# JDBC URL - override with environment variable FLYWAY_URL
flyway.url=jdbc:postgresql://localhost:5432/db

# Database credentials - override with environment variables
# FLYWAY_USER and FLYWAY_PASSWORD
flyway.user=postgres
flyway.password=postgres

# Locations to scan for migrations
flyway.locations=filesystem:./migrations

# Schema to manage
flyway.schemas=lesiv

# Baseline version for existing databases
flyway.baselineVersion=1
flyway.baselineDescription=Initial schema

# Automatically create schema if it doesn't exist
flyway.createSchemas=true

# Validate migrations on migrate
flyway.validateOnMigrate=true

# Placeholder replacement
flyway.placeholderReplacement=false

# Table to store migration history
flyway.table=flyway_schema_history

# Encoding
flyway.encoding=UTF-8

# SQL migration prefix
flyway.sqlMigrationPrefix=V

# SQL migration separator
flyway.sqlMigrationSeparator=__

# SQL migration suffixes
flyway.sqlMigrationSuffixes=.sql

flyway.validateMigrationNaming=false